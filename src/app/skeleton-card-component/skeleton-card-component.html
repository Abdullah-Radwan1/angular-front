<div class="card bg-base-100 shadow-xl w-full max-w-xs animate-pulse">
  <!-- Image -->
  <figure class="relative aspect-3/4 overflow-hidden bg-base-200">
    <div class="skeleton absolute inset-0 w-full h-full"></div>

    <!-- Fake badges -->
    <div class="absolute bottom-3 left-3 flex flex-col gap-1">
      <div class="skeleton h-4 w-20 rounded-full"></div>
      <div class="skeleton h-4 w-16 rounded-full"></div>
    </div>
  </figure>

  <!-- Body -->
  <div class="card-body p-4 gap-3">
    <!-- Name & Price -->
    <div class="flex items-start justify-between gap-2">
      <div class="flex-1 space-y-2">
        <div class="skeleton h-4 w-full"></div>
        <div class="skeleton h-4 w-3/4"></div>
      </div>

      <div class="flex flex-col items-end gap-1 shrink-0">
        <div class="skeleton h-5 w-12"></div>
        <div class="skeleton h-3 w-6"></div>
      </div>
    </div>

    <!-- Description -->
    <div class="space-y-2">
      <div class="skeleton h-3 w-full"></div>
      <div class="skeleton h-3 w-5/6"></div>
    </div>

    <!-- Colors -->
    <div class="flex flex-col gap-2">
      <div class="skeleton h-3 w-16"></div>

      <div class="flex gap-2">
        <div class="skeleton w-6 h-6 rounded-full"></div>
        <div class="skeleton w-6 h-6 rounded-full"></div>
        <div class="skeleton w-6 h-6 rounded-full"></div>
        <div class="skeleton w-6 h-6 rounded-full"></div>
      </div>
    </div>

    <!-- CTA -->
    <div class="card-actions mt-1">
      <div class="skeleton h-9 w-full rounded-md"></div>
    </div>
  </div>
</div>
