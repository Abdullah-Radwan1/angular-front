<section #sectionRef id="projects" class="px-4 py-20 md:px-8">
  <div class="mx-auto max-w-6xl">
    <!-- Header -->
    <div class="fade-up mx-auto mb-12 max-w-3xl text-center" [class.show]="inView()">
      <p class="mb-3 text-xs font-bold uppercase tracking-[0.2em] text-primary">{{ sectionTitle }}</p>
      <h2 class="text-3xl font-extrabold md:text-5xl">{{ sectionHeading }}</h2>
    </div>

    <!-- Grid -->
    @if (loading()) {
      <app-loader />
    } @else {
      <div class="grid grid-cols-1 gap-7 md:grid-cols-2 xl:grid-cols-3">
        @for (project of projects(); track project.title; let i = $index) {
          <div
            class="group fade-up card border border-base-300 bg-base-200 shadow-sm transition hover:-translate-y-1 hover:shadow-xl"
            [class.show]="inView()"
            }
            [style.transitionDelay]="getDelay(i)"
          >
            <!-- Image -->
            <div class="relative aspect-video overflow-hidden">
              <img
                [src]="project.image"
                [alt]="project.title"
                class="h-full w-full object-cover transition duration-500 group-hover:scale-105"
                loading="lazy"
              />
              <!-- Overlay -->
              <div class="absolute inset-0 flex items-center justify-center gap-3 bg-black/55 opacity-0 transition hover:opacity-100">
                <a
                  [href]="project.repoUrl"
                  target="_blank"
                  class="overlay-btn btn btn-sm btn-circle btn-neutral"
                  aria-label="GitHub"
                >
                  <ng-icon name="heroCodeBracket" size="18" />
                </a>
                <a
                  [href]="project.liveUrl"
                  target="_blank"
                  class="overlay-btn btn btn-sm btn-circle btn-primary"
                  aria-label="Live Preview"
                >
                  <ng-icon name="heroArrowTopRightOnSquare" size="18" />
                </a>
              </div>
            </div>

            <!-- Content -->
            <div class="card-body">
              <h3 class="card-title text-lg">{{ project.title }}</h3>
              <p class="text-sm leading-6 text-base-content/70">{{ project.description }}</p>
              <div class="mt-2 flex flex-wrap gap-2">
                @for (tech of project.technologies; track tech) {
                  <span class="badge badge-outline">{{ tech }}</span>
                }
              </div>
            </div>
          </div>
        }
      </div>
    }
  </div>
</section>
