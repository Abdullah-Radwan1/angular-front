<section class="relative flex min-h-screen flex-1 items-center justify-center overflow-hidden bg-base-100 text-base-content">
  <!-- Background -->
  <div class="absolute inset-0 z-[1]">
    <img [src]="heroBg" alt="hero background" class="h-full w-full scale-105 object-cover opacity-30" />

    <div class="absolute inset-0 z-[2] bg-gradient-to-b from-base-100/60 via-base-100/85 to-base-100"></div>

    <div class="pointer-events-none absolute inset-0 z-[3] bg-[radial-gradient(600px_circle_at_50%_50%,rgba(16,183,127,0.14),transparent_45%)]"></div>
  </div>

  <!-- Content -->
  <div class="relative z-10 flex flex-1 flex-col items-center justify-center px-4 text-center md:px-8">
    <p class="mb-4 text-xs font-bold uppercase tracking-[0.2em] text-primary">Abdullah Radwan</p>

    <h1 class="max-w-4xl text-balance text-4xl font-extrabold leading-tight md:text-6xl">
      Software Engineer specializing in
      <span class="bg-gradient-to-r from-primary via-secondary to-accent bg-clip-text text-transparent">
        Next.js, Angular, and Node.js
      </span>
      <br />
      architectures.
    </h1>

    <p class="mt-5 max-w-2xl text-base text-base-content/75 md:text-lg">
      Building scalable web applications with modern technologies.
    </p>

    <div class="mt-8 flex flex-col items-center justify-center gap-3 sm:flex-row">
      <a href="#projects" class="btn btn-primary"> View Projects ↗ </a>

      <a href="#contact" class="btn btn-outline"> Get in Touch </a>
    </div>
  </div>
</section>
