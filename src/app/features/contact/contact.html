<section id="contact" class="px-4 py-20 md:px-8">
  <div class="mx-auto max-w-6xl">
    <!-- Header -->
    <div class="mx-auto mb-12 max-w-3xl text-center">
      <p class="mb-3 text-xs font-bold uppercase tracking-[0.2em] text-primary">{{ sectionTitle }}</p>
      <h2 class="mb-4 text-3xl font-extrabold md:text-5xl">{{ sectionHeading }}</h2>
      <p class="text-base text-base-content/75 md:text-lg">{{ sectionDescription }}</p>
    </div>

    <div class="grid grid-cols-1 gap-6 lg:grid-cols-[0.9fr_1.4fr]">
      <!-- Left: Info -->
      <div class="space-y-4">
        <div class="card border border-base-300 bg-base-200 shadow-sm">
          <div class="card-body flex-row items-center gap-4 p-5">
            <div class="grid h-11 w-11 place-items-center rounded-xl bg-primary/15 text-primary">
            <ng-icon name="heroPhone" size="20" />
            </div>
            <div>
              <p class="text-xs font-semibold uppercase tracking-wider text-base-content/60">Phone</p>
              <a [href]="'tel:' + phone" class="link link-primary font-medium">{{ phone }}</a>
            </div>
          </div>
        </div>

        <div class="card border border-base-300 bg-base-200 shadow-sm">
          <div class="card-body flex-row items-center gap-4 p-5">
            <div class="grid h-11 w-11 place-items-center rounded-xl bg-secondary/20 text-secondary">
            <ng-icon name="heroEnvelope" size="20" />
            </div>
            <div>
              <p class="text-xs font-semibold uppercase tracking-wider text-base-content/60">Email</p>
              <a [href]="'mailto:' + email" class="link link-primary font-medium">{{ email }}</a>
            </div>
          </div>
        </div>

        <!-- Decorative blob -->
        <div
          class="pointer-events-none h-24 rounded-2xl bg-[radial-gradient(circle_at_20%_20%,rgba(16,183,127,0.2),transparent_60%)]"
          aria-hidden="true"
        ></div>
      </div>

      <!-- Right: Form -->
      <div class="rounded-2xl border border-base-300 bg-base-200 p-2 shadow-sm">
        @if (!submitted()) {
          <form class="card bg-base-100 shadow-sm" (ngSubmit)="onSubmit()" #contactForm="ngForm">
            <div class="card-body gap-4 p-6">
            <!-- Name -->
            <div class="space-y-2">
              <label class="label p-0" for="name"><span class="label-text font-semibold">Full Name</span></label>
              <div class="relative">
                <span class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-base-content/50">
                  <ng-icon name="heroUser" size="16" />
                </span>
                <input
                  id="name"
                  type="text"
                  class="input input-bordered w-full pl-10"
                  placeholder="John Doe"
                  [(ngModel)]="name"
                  name="name"
                  required
                />
              </div>
            </div>

            <!-- Email -->
            <div class="space-y-2">
              <label class="label p-0" for="email"><span class="label-text font-semibold">Email Address</span></label>
              <div class="relative">
                <span class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-base-content/50">
                  <ng-icon name="heroEnvelope" size="16" />
                </span>
                <input
                  id="email"
                  type="email"
                  class="input input-bordered w-full pl-10"
                  placeholder="john@example.com"
                  [(ngModel)]="senderEmail"
                  name="senderEmail"
                  required
                />
              </div>
            </div>

            <!-- Message -->
            <div class="space-y-2">
              <label class="label p-0" for="message"><span class="label-text font-semibold">Message</span></label>
              <div class="relative">
                <span class="pointer-events-none absolute left-3 top-4 text-base-content/50">
                  <ng-icon name="heroChatBubbleLeftRight" size="16" />
                </span>
                <textarea
                  id="message"
                  class="textarea textarea-bordered min-h-32 w-full pl-10"
                  placeholder="Tell me about your project..."
                  [(ngModel)]="message"
                  name="message"
                  rows="5"
                  required
                ></textarea>
              </div>
            </div>

            <button type="submit" class="btn btn-primary">
              <ng-icon name="heroPaperAirplane" size="18" />
              Send Message
            </button>
            </div>
          </form>
        } @else {
          <!-- Success State -->
          <div class="alert alert-success p-6">
            <div class="badge badge-success">✓</div>
            <h3 class="text-lg font-bold">Message Sent!</h3>
            <p class="text-sm text-base-content/80">Thanks for reaching out. I'll get back to you soon.</p>
            <button class="reset-btn btn btn-sm btn-outline" (click)="reset()">Send Another</button>
          </div>
        }
      </div>
    </div>
  </div>
</section>
