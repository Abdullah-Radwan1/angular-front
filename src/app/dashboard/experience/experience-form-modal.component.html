<!-- Experience Form Modal -->
<div *ngIf="isVisible" class="modal modal-open">
  <div class="modal-box max-w-3xl">
    <!-- HEADER -->
    <div class="flex items-start justify-between mb-4">
      <div>
        <h3 class="font-bold text-xl">
          {{ experience ? 'Edit Experience' : 'Add Experience' }}
        </h3>
        <p class="text-sm opacity-60">Fill in your professional experience details</p>
      </div>

      <button class="btn btn-sm btn-circle btn-ghost" (click)="onClose()">✕</button>
    </div>

    <!-- FORM -->
    <form [formGroup]="form" class="space-y-6">
      <!-- GRID: Role + Company -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="form-control">
          <label class="label">
            <span class="label-text font-medium"> Role <span class="text-error">*</span> </span>
          </label>
          <input
            type="text"
            placeholder="e.g. Frontend Developer"
            class="input input-bordered w-full focus:input-primary"
            formControlName="role"
          />
          <label class="label" *ngIf="form.get('role')?.invalid && form.get('role')?.touched">
            <span class="label-text-alt text-error">Role is required</span>
          </label>
        </div>

        <div class="form-control">
          <label class="label">
            <span class="label-text font-medium"> Company <span class="text-error">*</span> </span>
          </label>
          <input
            type="text"
            placeholder="e.g. Google"
            class="input input-bordered w-full focus:input-primary"
            formControlName="company"
          />
        </div>
      </div>

      <!-- GRID: Location + Period -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="form-control">
          <label class="label">
            <span class="label-text font-medium"> Location <span class="text-error">*</span> </span>
          </label>
          <input
            type="text"
            placeholder="e.g. Cairo, Egypt"
            class="input input-bordered w-full focus:input-primary"
            formControlName="location"
          />
        </div>

        <div class="form-control">
          <label class="label">
            <span class="label-text font-medium"> Period <span class="text-error">*</span> </span>
          </label>
          <input
            type="text"
            placeholder="Jan 2023 - Present"
            class="input input-bordered w-full focus:input-primary"
            formControlName="period"
          />
        </div>
      </div>

      <!-- CURRENT CHECKBOX -->
      <div class="form-control bg-base-200 p-3 rounded-lg">
        <label class="label cursor-pointer justify-between">
          <span class="label-text font-medium">Currently working here</span>
          <input type="checkbox" class="checkbox checkbox-primary" formControlName="current" />
        </label>
      </div>

      <!-- BULLETS -->
      <div class="form-control">
        <label class="label">
          <span class="label-text font-medium"> Responsibilities & Achievements </span>
        </label>

        <textarea
          placeholder="• Built scalable UI components&#10;• Improved performance by 40%&#10;• Worked with Angular & NestJS"
          class="textarea textarea-bordered w-full min-h-[120px] focus:textarea-primary"
          formControlName="bullets"
        ></textarea>

        <label class="label">
          <span class="label-text-alt opacity-60">
            Tip: separate items with commas or new lines
          </span>
        </label>
      </div>
    </form>

    <!-- ACTIONS -->
    <div class="modal-action mt-6 flex justify-between">
      <button class="btn btn-ghost" (click)="onClose()">Cancel</button>

      <button class="btn btn-primary" (click)="onSave()" [disabled]="form.invalid">
        {{ experience ? 'Update Experience' : 'Create Experience' }}
      </button>
    </div>
  </div>
</div>
