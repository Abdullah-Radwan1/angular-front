<!-- Projects Form Modal -->
<div *ngIf="isVisible" class="modal modal-open">
  <div class="modal-box max-w-3xl">
    <!-- HEADER -->
    <div class="flex items-start justify-between mb-4">
      <div>
        <h3 class="font-bold text-xl">
          {{ project ? 'Edit Project' : 'Add Project' }}
        </h3>
        <p class="text-sm opacity-60">Create a showcase project for your portfolio</p>
      </div>

      <button class="btn btn-sm btn-circle btn-ghost" (click)="onClose()">✕</button>
    </div>

    <!-- FORM -->
    <form [formGroup]="form" class="space-y-6">
      <!-- BASIC INFO -->
      <div class="space-y-4">
        <div class="form-control">
          <label class="label">
            <span class="label-text font-medium"> Title <span class="text-error">*</span> </span>
          </label>

          <input
            type="text"
            placeholder="e.g. E-commerce Dashboard"
            class="input input-bordered w-full focus:input-primary"
            formControlName="title"
          />
        </div>

        <div class="form-control">
          <label class="label">
            <span class="label-text font-medium">Description</span>
          </label>

          <textarea
            placeholder="Explain what this project does..."
            class="textarea textarea-bordered w-full min-h-[100px] focus:textarea-primary"
            rows="3"
            formControlName="description"
          ></textarea>

          <label class="label">
            <span class="label-text-alt opacity-60"> Keep it short and clear (what + why) </span>
          </label>
        </div>
      </div>

      <!-- TECH STACK -->
      <div class="form-control">
        <label class="label">
          <span class="label-text font-medium">Technologies</span>
        </label>

        <input
          type="text"
          placeholder="Angular, NestJS, PostgreSQL, Tailwind"
          class="input input-bordered w-full focus:input-primary"
          formControlName="technologies"
        />

        <label class="label">
          <span class="label-text-alt opacity-60"> Separate with commas </span>
        </label>
      </div>

      <!-- LINKS GRID -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="form-control">
          <label class="label">
            <span class="label-text font-medium">Live URL</span>
          </label>

          <input
            type="url"
            placeholder="https://your-project.com"
            class="input input-bordered w-full focus:input-primary"
            formControlName="liveUrl"
          />
        </div>

        <div class="form-control">
          <label class="label">
            <span class="label-text font-medium">Repository</span>
          </label>

          <input
            type="url"
            placeholder="https://github.com/..."
            class="input input-bordered w-full focus:input-primary"
            formControlName="repoUrl"
          />
        </div>
      </div>

      <!-- IMAGE -->
      <div class="form-control">
        <label class="label">
          <span class="label-text font-medium">Project Image</span>
        </label>

        <input
          type="url"
          placeholder="https://example.com/image.png"
          class="input input-bordered w-full focus:input-primary"
          formControlName="image"
        />

        <label class="label">
          <span class="label-text-alt opacity-60">
            Recommended: 16:9 image for best UI display
          </span>
        </label>
      </div>
    </form>

    <!-- ACTIONS -->
    <div class="modal-action flex justify-between mt-6">
      <button class="btn btn-ghost" (click)="onClose()">Cancel</button>

      <button class="btn btn-primary" (click)="onSave()" [disabled]="form.invalid">
        {{ project ? 'Update Project' : 'Create Project' }}
      </button>
    </div>
  </div>
</div>
