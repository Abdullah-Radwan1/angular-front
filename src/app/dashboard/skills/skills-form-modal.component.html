<!-- Skills Form Modal -->
<div *ngIf="isVisible" class="modal modal-open">
  <div class="modal-box max-w-xl">
    <!-- HEADER -->
    <div class="flex items-start justify-between mb-4">
      <div>
        <h3 class="font-bold text-xl">
          {{ skill ? 'Edit Skill' : 'Add Skill' }}
        </h3>
        <p class="text-sm opacity-60">Add a skill to your tech stack</p>
      </div>

      <button class="btn btn-sm btn-circle btn-ghost" (click)="onClose()">✕</button>
    </div>

    <!-- FORM -->
    <form [formGroup]="form" class="space-y-6">
      <!-- NAME -->
      <div class="form-control">
        <label class="label">
          <span class="label-text font-medium"> Skill Name <span class="text-error">*</span> </span>
        </label>

        <input
          type="text"
          placeholder="e.g. Angular, Node.js, Docker"
          class="input input-bordered w-full focus:input-primary"
          formControlName="name"
        />
      </div>

      <!-- CATEGORY -->
      <div class="form-control">
        <label class="label">
          <span class="label-text font-medium"> Category <span class="text-error">*</span> </span>
        </label>

        <select
          class="select select-bordered w-full focus:select-primary"
          formControlName="category"
        >
          <option value="">Select category</option>

          <option *ngFor="let cat of skillCategories" [value]="cat.value">
            {{ cat.label }}
          </option>
        </select>

        <label class="label">
          <span class="label-text-alt opacity-60"> Helps group skills in your portfolio </span>
        </label>
      </div>

      <!-- LEVEL -->
      <div class="form-control">
        <label class="label">
          <span class="label-text font-medium">Level</span>
        </label>

        <input
          type="text"
          placeholder="Beginner / Intermediate / Expert"
          class="input input-bordered w-full focus:input-primary"
          formControlName="level"
        />

        <label class="label">
          <span class="label-text-alt opacity-60"> Optional skill proficiency level </span>
        </label>
      </div>

      <!-- ICON -->
      <div class="form-control">
        <label class="label">
          <span class="label-text font-medium">Icon URL</span>
        </label>

        <input
          type="url"
          placeholder="https://example.com/icon.svg"
          class="input input-bordered w-full focus:input-primary"
          formControlName="iconUrl"
        />

        <label class="label">
          <span class="label-text-alt opacity-60"> Optional icon for UI display </span>
        </label>
      </div>
    </form>

    <!-- ACTIONS -->
    <div class="modal-action flex justify-between mt-6">
      <button class="btn btn-ghost" (click)="onClose()">Cancel</button>

      <button class="btn btn-primary" (click)="onSave()" [disabled]="form.invalid">
        {{ skill ? 'Update Skill' : 'Create Skill' }}
      </button>
    </div>
  </div>
</div>
