<div class="space-y-4">
  <div class="flex justify-between items-center">
    <h3 class="text-lg font-semibold">Skills</h3>
    <button class="btn btn-primary btn-sm" (click)="onAdd()">+ Add Skill</button>
  </div>

  <div class="card bg-base-100 border border-base-300 shadow-md">
    <div class="overflow-x-auto">
      <table class="table table-zebra">
        <thead>
          <tr class="text-xs uppercase opacity-60">
            <th>Name</th>
            <th>Category</th>
            <th>Level</th>
            <th class="text-right">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let skill of skills" class="hover">
            <td class="font-medium">{{ skill.name }}</td>
            <td>
              <span class="badge badge-outline badge-sm">
                {{ skill.category }}
              </span>
            </td>
            <td>{{ skill.level }}</td>
            <td class="text-right space-x-2">
              <button class="btn btn-xs" (click)="onEdit(skill)">Edit</button>
              <button class="btn btn-xs btn-error" (click)="onDelete(skill)">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
