<div class="toast toast-top toast-end z-50 gap-2 p-4">
  @for (notification of notifications(); track notification.id) {
    <div
      class="alert items-start border border-neutral/20 bg-base-100 p-3.5 shadow-sm transition-all duration-300 ease-in-out md:max-w-sm"
      [ngClass]="getAlertClass(notification.type)"
      role="alert"
    >
      <!-- Icon & Text Container -->
      <div class="flex-1 flex gap-3">
        <!-- Render the exact Lucide attribute directive depending on type -->
        <div class="mt-0.5 shrink-0">
          @switch (notification.type) {
            @case ('success') {
              <svg lucideCheckCircle2 class="text-success" strokeWidth="2"></svg>
            }
            @case ('error') {
              <svg lucideXCircle class="text-error" strokeWidth="2"></svg>
            }
            @case ('warning') {
              <svg lucideAlertTriangle class="text-warning" strokeWidth="2"></svg>
            }
            @default {
              <svg lucideInfo class="text-info" strokeWidth="2"></svg>
            }
          }
        </div>

        <!-- Text Message -->
        <div class="flex flex-col text-left">
          <p class="text-xs font-medium tracking-wide leading-relaxed text-base-content/90">
            {{ notification.message }}
          </p>
        </div>
      </div>

      <!-- Action Close Button -->
      <button
        class="btn btn-ghost btn-xs btn-square -mt-1 -me-1 text-base-content/40 hover:bg-neutral/10 hover:text-base-content"
        (click)="remove(notification.id)"
        aria-label="Close notification"
      >
        ✕
      </button>
    </div>
  }
</div>
