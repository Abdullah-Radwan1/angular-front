<div class="toast toast-top toast-end z-50">
  @for (notification of notifications(); track notification.id) {
  <div class="alert shadow-lg" [ngClass]="getAlertClass(notification.type)">
    <div>
      <span>{{ notification.message }}</span>
    </div>
    <button class="btn btn-ghost btn-xs" (click)="remove(notification.id)">✕</button>
  </div>
  }
</div>
