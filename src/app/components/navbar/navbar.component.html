<nav [ngClass]="{ scrolled: scrolled }">
  <div class="nav-content">
    <a href="#" class="nav-logo">&lt;Abdullah /&gt;</a>

    <!-- Desktop Menu -->
    <div class="nav-menu">
      <ul>
        <li *ngFor="let link of navLinks">
          <a [href]="link.href">{{ link.label }}</a>
        </li>
      </ul>
    </div>

    <!-- Mobile Menu -->
    <div class="nav-mobile">
      <button class="nav-mobile-toggle" (click)="openMobile()">☰</button>
    </div>
  </div>

  <!-- Mobile Drawer -->
  <div class="mobile-drawer" [ngClass]="{ open: mobileOpen }">
    <div class="drawer-header">
      <span class="drawer-title">Menu</span>
      <button class="close-btn" (click)="closeMobile()">✕</button>
    </div>
    <ul>
      <li *ngFor="let link of navLinks">
        <a [href]="link.href" (click)="closeMobile()">{{ link.label }}</a>
      </li>
    </ul>
  </div>

  <!-- Overlay -->
  <div class="overlay" [ngClass]="{ open: mobileOpen }" (click)="closeMobile()"></div>
</nav>
