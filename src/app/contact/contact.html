<div class="p-8 max-w-lg mx-auto">
  <h2 class="text-3xl font-bold mb-6">Contact</h2>
  <form nz-form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <nz-form-item>
      <nz-form-control nzErrorTip="Please input your name!">
        <input nz-input formControlName="name" placeholder="Name" />
      </nz-form-control>
    </nz-form-item>

    <nz-form-item>
      <nz-form-control nzErrorTip="The input is not valid E-mail!">
        <input nz-input formControlName="email" placeholder="Email" />
      </nz-form-control>
    </nz-form-item>

    <button nz-button nzType="primary" [disabled]="contactForm.invalid">Send Message</button>
  </form>
</div>
