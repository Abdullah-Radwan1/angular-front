<nav
  class="fixed top-0 left-0 right-0 z-50 transition-all text-white duration-300"
  [ngClass]="{
    'bg-background/90 backdrop-blur-xl border-b border-border/50 shadow-sm': scrolled,
    'bg-transparent': !scrolled,
  }"
>
  <div class="container mx-auto flex items-center justify-between px-4 py-4 md:px-0">
    <a href="#" class="font-display text-lg font-bold text-foreground">&lt;Abdullah /&gt;</a>

    <div class="hidden md:flex items-center gap-10">
      <ul nz-menu nzMode="horizontal" class="bg-transparent border-0">
        <li nz-menu-item *ngFor="let link of navLinks" class="px-0">
          <a
            [href]="link.href"
            class="text-sm text-foreground hover:text-primary transition-colors duration-200"
          >
            {{ link.label }}
          </a>
        </li>
      </ul>
    </div>

    <div class="md:hidden flex items-center gap-3">
      <button nz-button nzType="text" class="text-foreground" (click)="openMobile()">
        <span nz-icon nzType="menu"></span>
      </button>
    </div>
  </div>

  <nz-drawer
    [nzVisible]="mobileOpen"
    nzPlacement="left"
    nzTitle="Menu"
    [nzMaskStyle]="{ backdropFilter: 'blur(10px)' }"
    (nzOnClose)="closeMobile()"
  >
    <ul nz-menu nzMode="inline" class="mt-4">
      <li nz-menu-item *ngFor="let link of navLinks">
        <a [href]="link.href" (click)="closeMobile()" class="block w-full py-3 text-foreground">
          {{ link.label }}
        </a>
      </li>
    </ul>
  </nz-drawer>
</nav>
